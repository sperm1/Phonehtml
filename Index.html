<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0d0d0f;
    --card:#1c1c1e;
    --card2:#242426;
    --text:#f2f2f7;
    --sub:#8e8e93;
    --accent:#0a84ff;
    --bubble-me:#0a84ff;
    --bubble-them:#26262a;
    --danger:#ff453a;
    --line:#2c2c2e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:#050505;
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .phone{
    width:390px;
    max-width:100vw;
    height:844px;
    max-height:100vh;
    margin:0 auto;
    background:var(--bg);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border-radius:0;
    box-shadow:0 0 0 1px #000;
  }
  @media (min-width:430px){
    body{ display:flex; align-items:center; justify-content:center; min-height:100vh;}
    .phone{
      border-radius:46px;
      border:10px solid #111;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
      height:844px;
    }
  }
  .statusbar{
    height:44px;
    flex:0 0 44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 22px;
    font-size:15px;
    font-weight:600;
    color:var(--text);
    background:var(--bg);
  }
  .statusbar .dot{width:4px;}

  /* ---------- Screens ---------- */
  .screen{
    position:absolute;
    top:44px; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    transform:translateX(0);
    transition:transform .32s cubic-bezier(.32,.72,0,1);
  }
  #contactsScreen{ z-index:1; }
  #chatScreen{
    z-index:2;
    transform:translateX(100%);
  }
  .phone.chat-open #chatScreen{ transform:translateX(0); }
  .phone.chat-open #contactsScreen{ transform:translateX(-25%); filter:brightness(0.7); }

  /* ---------- Contacts list header ---------- */
  .nav{
    padding:6px 16px 10px 16px;
    flex:0 0 auto;
  }
  .nav-title{
    font-size:34px;
    font-weight:800;
    color:var(--text);
    padding:2px 4px 10px 4px;
    letter-spacing:-0.5px;
  }
  .search{
    background:var(--card);
    border-radius:10px;
    padding:9px 12px;
    color:var(--sub);
    font-size:15px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .search svg{width:15px;height:15px;flex:0 0 auto;}

  .list{
    flex:1 1 auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:20px;
  }
  .list::-webkit-scrollbar{ width:0; }

  .contact-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 16px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
  }
  .contact-row:active{ background:#141416; }
  .avatar{
    width:52px; height:52px; border-radius:50%;
    flex:0 0 52px;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:19px; color:#fff;
    background-size:cover; background-position:center;
  }
  .row-main{ flex:1 1 auto; min-width:0; }
  .row-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .row-name{ font-size:17px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row-time{ font-size:13px; color:var(--sub); flex:0 0 auto; }
  .row-preview{
    font-size:15px; color:var(--sub);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    margin-top:2px;
  }
  .unread-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--accent);
    flex:0 0 9px;
    margin-left:4px;
  }

  /* ---------- Chat screen ---------- */
  .chat-header{
    display:flex; align-items:center; gap:8px;
    padding:6px 10px;
    border-bottom:1px solid var(--line);
    flex:0 0 auto;
    background:rgba(10,10,10,.9);
    backdrop-filter:blur(10px);
  }
  .back-btn{
    display:flex; align-items:center; gap:2px;
    color:var(--accent);
    font-size:17px;
    padding:6px 4px;
    cursor:pointer;
    flex:0 0 auto;
  }
  .back-btn svg{ width:11px; height:18px; }
  .chat-id{
    flex:1 1 auto;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .chat-avatar{
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:13px; color:#fff; margin-bottom:2px;
    background-size:cover; background-position:center;
  }
  .chat-name{ font-size:11px; color:var(--sub); font-weight:500; }
  .video-icon{ width:34px; flex:0 0 34px; color:var(--accent); }
  .video-icon svg{ width:26px; height:26px; }

  .messages{
    flex:1 1 auto;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:14px 12px 10px 12px;
    display:flex; flex-direction:column; gap:3px;
  }
  .messages::-webkit-scrollbar{ width:0; }

  .day-marker{
    text-align:center;
    color:var(--sub);
    font-size:11px;
    font-weight:600;
    margin:10px 0 8px 0;
  }

  .bubble-row{ display:flex; width:100%; margin:2px 0; }
  .bubble-row.me{ justify-content:flex-end; }
  .bubble-row.them{ justify-content:flex-start; }

  .bubble{
    max-width:75%;
    padding:9px 14px;
    border-radius:20px;
    font-size:16px;
    line-height:1.28;
    word-wrap:break-word;
    white-space:pre-wrap;
  }
  .me .bubble{
    background:var(--bubble-me);
    color:#fff;
    border-bottom-right-radius:5px;
  }
  .them .bubble{
    background:var(--bubble-them);
    color:var(--text);
    border-bottom-left-radius:5px;
  }
  .msg-time{
    text-align:center;
    color:var(--sub);
    font-size:10px;
    margin:6px 0 2px 0;
  }

  .input-bar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    padding-bottom:calc(8px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    background:var(--bg);
  }
  .plus-btn{
    width:30px; height:30px; border-radius:50%;
    border:1px solid var(--sub);
    color:var(--sub);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex:0 0 30px;
  }
  .input-pill{
    flex:1 1 auto;
    background:#1c1c1e;
    border:1px solid #3a3a3c;
    border-radius:18px;
    padding:8px 14px;
    color:var(--sub);
    font-size:16px;
  }
  .mic-btn{ color:var(--accent); flex:0 0 auto; font-size:20px; }

  /* scrollbars off on desktop too */
  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <div class="statusbar">
    <span id="clock">9:41</span>
    <span>●●●</span>
  </div>

  <!-- CONTACTS / MESSAGE LIST SCREEN -->
  <div class="screen" id="contactsScreen">
    <div class="nav">
      <div class="nav-title">Messages</div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </div>
    </div>
    <div class="list" id="contactList"></div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="chatScreen">
    <div class="chat-header">
      <div class="back-btn" id="backBtn">
        <svg viewBox="0 0 12 20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L2 10l8 8"/></svg>
        <span id="unreadCount"></span>
      </div>
      <div class="chat-id">
        <div class="chat-avatar" id="chatAvatar"></div>
        <div class="chat-name" id="chatName"></div>
      </div>
      <div class="video-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 10l5-3v10l-5-3M4 6h9a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
      </div>
    </div>
    <div class="messages" id="messagesArea"></div>
    <div class="input-bar">
      <div class="plus-btn">+</div>
      <div class="input-pill">iMessage</div>
      <div class="mic-btn">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 15a3 3 0 003-3V6a3 3 0 00-6 0v6a3 3 0 003 3z"/><path d="M19 11a7 7 0 01-14 0M12 18v3"/></svg>
      </div>
    </div>
  </div>

</div>

<script>
const contacts = [

  },
  {
    id: "abraham",

    unread: 3,
    messages: [
      {who:"them", text:"can't stop thinking about last night", time:"Mon 11:40 PM"},

  {
    id: "juan",
    name: "Juan Dela Cruz",
    initials: "JD",

    unread: 0,
    messages: [
      {who:"them", text:"bro did you catch the game last night", time:"Fri 8:15 PM"},
      {who:"me", text:"nooo I missed it, what happened", time:"Fri 8:40 PM"},
      {who:"them", text:"insane last minute comeback, I'll send you the highlights", time:"Fri 8:41 PM"},
      {who:"them", text:"also happy to help you move this weekend if you still need hands", time:"Fri 9:00 PM"},
      {who:"me", text:"that would be a huge help, thank you!", time:"Fri 9:05 PM"},
    ]
  },
];

const listEl = document.getElementById('contactList');
const phone = document.getElementById('phone');
const messagesArea = document.getElementById('messagesArea');
const chatName = document.getElementById('chatName');
const chatAvatar = document.getElementById('chatAvatar');

function avatarStyle(c){
  return `background:${c.color}`;
}

function renderList(){
  listEl.innerHTML = '';
  contacts.forEach(c => {
    const last = c.messages[c.messages.length - 1];
    const row = document.createElement('div');
    row.className = 'contact-row';
    row.onclick = () => openChat(c.id);
    row.innerHTML = `
      <div class="avatar" style="${avatarStyle(c)}">${c.initials}</div>
      <div class="row-main">
        <div class="row-top">
          <div class="row-name">${c.name}</div>
          <div class="row-time">${c.time}</div>
        </div>
        <div class="row-preview">${(last.who==='me' ? 'You: ' : '') + last.text}</div>
      </div>
      ${c.unread ? '<div class="unread-dot"></div>' : ''}
    `;
    listEl.appendChild(row);
  });
}

function renderChat(c){
  chatName.textContent = c.name;
  chatAvatar.textContent = c.initials;
  chatAvatar.style.background = c.color;
  messagesArea.innerHTML = '';
  c.messages.forEach((m, i) => {
    if(i === 0 || i % 4 === 0){
      const marker = document.createElement('div');
      marker.className = 'msg-time';
      marker.textContent = m.time;
      messagesArea.appendChild(marker);
    }
    const row = document.createElement('div');
    row.className = 'bubble-row ' + (m.who === 'me' ? 'me' : 'them');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = m.text;
    row.appendChild(bubble);
    messagesArea.appendChild(row);
  });
}

function openChat(id){
  const c = contacts.find(x => x.id === id);
  if(!c) return;
  c.unread = 0;
  renderChat(c);
  phone.classList.add('chat-open');
  setTimeout(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }, 320);
}

function closeChat(){
  phone.classList.remove('chat-open');
  renderList();
}

document.getElementById('backBtn').addEventListener('click', closeChat);

renderList();

// live clock in status bar
function updateClock(){
  const d = new Date();
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if(h === 0) h = 12;
  document.getElementById('clock').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 30000);
</script>
